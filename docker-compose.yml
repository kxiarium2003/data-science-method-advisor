services:

  backend:
    build: ./back

    container_name: method-advisor-backend

    ports:
      - "8000:8000"

  frontend:
    build: ./front

    container_name: method-advisor-frontend

    ports:
      - "8501:8501"

    environment:
      - API_URL=http://backend:8000/recommend

    depends_on:
      - backend